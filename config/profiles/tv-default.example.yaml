profile:
  name: tv-default
  description: Episodic defaults with Plex-friendly season folders.
  video:
    non_4k:
      preferred_codec: hevc
      max_video_bitrate_mbps: 8
  renaming:
    template: "{{ series_title }}/Season {{ season_number }}/{{ series_title }} - s{{ season_number_padded }}e{{ episode_number_padded }} - {{ episode_title }}"

