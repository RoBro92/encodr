version: 1
name: default-policy
description: >
  Baseline ingestion preparation policy for Plex-style libraries.

languages:
  preferred_audio:
    - eng
  preferred_subtitles:
    - eng
  preserve_forced_subtitles: true
  drop_undetermined_audio: false
  drop_undetermined_subtitles: true

subtitles:
  keep_languages:
    - eng
  keep_forced_languages:
    - eng
  keep_commentary: false
  keep_hearing_impaired: true

audio:
  keep_languages:
    - eng
  preserve_best_surround: true
  preserve_atmos_capable: true
  preferred_codecs:
    - truehd
    - eac3
    - dts-hd ma
    - dts
    - ac3
    - aac
  allow_commentary: false
  max_tracks_to_keep: 2

video:
  output_container: mkv
  non_4k:
    decision_order:
      - skip
      - remux
      - transcode
    preferred_codec: hevc
    allow_transcode: true
    max_video_bitrate_mbps: 12
    max_width: 1920
  four_k:
    mode: strip_only
    preserve_original_video: true
    preserve_original_audio: true
    allow_transcode: false
    remove_non_english_audio: true
    remove_non_english_subtitles: true

replacement:
  in_place: true
  require_verification: true
  keep_original_until_verified: true
  delete_replaced_source: false

renaming:
  enabled: true
  movies_template: "{{ title }} ({{ year }})"
  episodes_template: "{{ series_title }}/Season {{ season_number }}/{{ series_title }} - s{{ season_number_padded }}e{{ episode_number_padded }} - {{ episode_title }}"
  sanitise_for_filesystem: true

profiles:
  path_overrides:
    - path_prefix: /media/Movies
      profile: movies-default
    - path_prefix: /media/TV
      profile: tv-default

