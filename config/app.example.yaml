app:
  name: encodr
  environment: production
  log_level: INFO
  timezone: Europe/London
  data_dir: /data
  scratch_dir: /temp
  output:
    return_to_original_folder: true
    default_container: mkv
  api:
    host: 0.0.0.0
    port: 8000
    base_path: /api
  ui:
    public_url: http://localhost:5173
  auth:
    enabled: true
    session_mode: jwt
    access_token_ttl_minutes: 30
    refresh_token_ttl_days: 14
    password_hash_scheme: argon2id
    access_token_algorithm: HS256
  database:
    dsn: postgresql+psycopg://encodr:change-me-before-production@postgres:5432/encodr
  redis:
    url: redis://redis:6379/0
  media:
    ffprobe_path: /usr/bin/ffprobe
    ffmpeg_path: /usr/bin/ffmpeg
    verify_outputs: true
    keep_job_artifacts: false
  dashboard:
    recent_job_limit: 25
    analytics_window_days: 30
  update:
    enabled: true
    metadata_url: https://api.github.com/repos/RoBro92/encodr/releases/latest
    channel: internal
    check_timeout_seconds: 5
