app:
  name: encodr
  environment: development
  log_level: INFO
  timezone: Europe/London
  data_dir: /data
  scratch_dir: /scratch/encodr
  output:
    return_to_original_folder: true
    default_container: mkv
  api:
    host: 0.0.0.0
    port: 8000
    base_path: /api
  ui:
    public_url: http://localhost:5173
  auth:
    enabled: true
    session_mode: jwt
    access_token_ttl_minutes: 30
    refresh_token_ttl_days: 14
    password_hash_scheme: argon2id
    access_token_algorithm: HS256
  database:
    dsn: postgresql+psycopg://encodr:encodr-dev-password@postgres:5432/encodr
  redis:
    url: redis://redis:6379/0
  media:
    ffprobe_path: /usr/bin/ffprobe
    ffmpeg_path: /usr/bin/ffmpeg
    verify_outputs: true
    keep_job_artifacts: false
  dashboard:
    recent_job_limit: 25
    analytics_window_days: 30
