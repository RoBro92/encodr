services:
  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      ENCODR_APP_CONFIG_FILE: /config/app.yaml
      ENCODR_POLICY_CONFIG_FILE: /config/policy.yaml
      ENCODR_WORKERS_CONFIG_FILE: /config/workers.yaml
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/config:ro
      - ${ENCODR_TEMP_HOST_PATH:-/temp}:/temp
      - ./.runtime/data:/data
      - ${ENCODR_MEDIA_HOST_PATH:-/media}:/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      ENCODR_APP_CONFIG_FILE: /config/app.yaml
      ENCODR_POLICY_CONFIG_FILE: /config/policy.yaml
      ENCODR_WORKERS_CONFIG_FILE: /config/workers.yaml
    volumes:
      - ./config:/config:ro
      - ${ENCODR_TEMP_HOST_PATH:-/temp}:/temp
      - ./.runtime/data:/data
      - ${ENCODR_MEDIA_HOST_PATH:-/media}:/media
    depends_on:
      api:
        condition: service_healthy

  worker-agent:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/worker-agent.Dockerfile
    env_file:
      - .env
    environment:
      ENCODR_WORKER_AGENT_API_BASE_URL: http://api:8000/api
      ENCODR_WORKER_AGENT_REGISTRATION_SECRET: ${ENCODR_WORKER_REGISTRATION_SECRET}
      ENCODR_APP_CONFIG_FILE: /config/app.yaml
      ENCODR_POLICY_CONFIG_FILE: /config/policy.yaml
      ENCODR_WORKERS_CONFIG_FILE: /config/workers.yaml
    volumes:
      - ./config:/config:ro
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "app.main", "loop", "999999"]

  ui:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/ui.Dockerfile
    env_file:
      - .env
    environment:
      ENCODR_UI_API_PROXY_TARGET: http://api:8000
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-encodr}
      POSTGRES_USER: ${POSTGRES_USER:-encodr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-encodr-dev-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-encodr} -d ${POSTGRES_DB:-encodr}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
