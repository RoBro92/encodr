version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/config:ro
      - ./scratch:/scratch
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    volumes:
      - ./config:/config:ro
      - ./scratch:/scratch
    depends_on:
      - postgres
      - redis

  worker-agent:
    build:
      context: .
      dockerfile: infra/docker/worker-agent.Dockerfile
    env_file:
      - .env
    volumes:
      - ./config:/config:ro

  ui:
    build:
      context: .
      dockerfile: infra/docker/ui.Dockerfile
    env_file:
      - .env
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-encodr}
      POSTGRES_USER: ${POSTGRES_USER:-encodr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-encodr-dev-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis-data:/data

