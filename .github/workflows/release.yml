name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Encodr ${tag}" >> "${GITHUB_OUTPUT}"
          if [[ "${tag}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate tag exists
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_NAME: ${{ steps.tag.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "${NOTES_FILE}"

          cat >> "${NOTES_FILE}" <<'EOF'

          ## Operator Notes
          - Use `encodr version` and `encodr doctor` after upgrade or install.
          - Update with `encodr update --apply`.
          - Restart the container or host afterwards if newly passed-through storage or GPU devices are not visible yet.
          EOF

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          fi
