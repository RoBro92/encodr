name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to release"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      release_name: ${{ steps.tag.outputs.release_name }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      target_sha: ${{ steps.tag.outputs.target_sha }}
      owner: ${{ steps.tag.outputs.owner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi

          target_sha="$(git rev-list -n 1 "refs/tags/${tag}")"
          owner="${GITHUB_REPOSITORY_OWNER,,}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Encodr ${tag}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          if [[ "${tag}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate tag exists
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

  build-images:
    name: build-${{ matrix.name }}
    needs: resolve-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: encodr-api
            dockerfile: infra/docker/api.Dockerfile
            cache_scope: encodr-api
          - name: ui
            image: encodr-ui
            dockerfile: infra/docker/ui.Dockerfile
            cache_scope: encodr-ui
          - name: worker
            image: encodr-worker
            dockerfile: infra/docker/worker.Dockerfile
            cache_scope: encodr-worker
          - name: worker-agent
            image: encodr-worker-agent
            dockerfile: infra/docker/worker-agent.Dockerfile
            cache_scope: encodr-worker-agent

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.resolve-release.outputs.tag }}

      - name: Resolve image tags
        id: image-tags
        shell: bash
        env:
          OWNER: ${{ needs.resolve-release.outputs.owner }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
          PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "ghcr.io/${OWNER}/${IMAGE_NAME}:${RELEASE_TAG}"
            if [[ "${RELEASE_VERSION}" != "${RELEASE_TAG}" ]]; then
              echo "ghcr.io/${OWNER}/${IMAGE_NAME}:${RELEASE_VERSION}"
            fi
            if [[ "${PRERELEASE}" == "false" ]]; then
              echo "ghcr.io/${OWNER}/${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  publish-release:
    needs:
      - resolve-release
      - build-images
    runs-on: ubuntu-latest

    steps:
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_NAME: ${{ needs.resolve-release.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
          RELEASE_TARGET_SHA: ${{ needs.resolve-release.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${RELEASE_TARGET_SHA}" \
            --jq '.body' > "${NOTES_FILE}"

          cat >> "${NOTES_FILE}" <<'EOF'

          ## Operator Notes
          - Use `encodr version` and `encodr doctor` after upgrade or install.
          - Update with `encodr update --apply`.
          - Restart the container or host afterwards if newly passed-through storage or GPU devices are not visible yet.
          - GHCR images are published for the release tag. Stable releases also publish `latest`.
          EOF

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          fi
