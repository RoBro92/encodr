name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to release"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Encodr ${tag}" >> "${GITHUB_OUTPUT}"
          if [[ "${tag}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate tag exists
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Check out release tag
        shell: bash
        run: git checkout --detach "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Resolve GHCR image tags
        id: images
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          release_tag="${{ steps.tag.outputs.tag }}"
          release_version="${{ steps.tag.outputs.version }}"
          prerelease="${{ steps.tag.outputs.prerelease }}"

          emit_tags() {
            local output_name="$1"
            local image_name="$2"

            {
              echo "${output_name}<<EOF"
              echo "ghcr.io/${owner}/${image_name}:${release_tag}"
              if [[ "${release_version}" != "${release_tag}" ]]; then
                echo "ghcr.io/${owner}/${image_name}:${release_version}"
              fi
              if [[ "${prerelease}" == "false" ]]; then
                echo "ghcr.io/${owner}/${image_name}:latest"
              fi
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          }

          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          emit_tags "api_tags" "encodr-api"
          emit_tags "ui_tags" "encodr-ui"
          emit_tags "worker_tags" "encodr-worker"
          emit_tags "worker_agent_tags" "encodr-worker-agent"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.images.outputs.api_tags }}

      - name: Publish UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/ui.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.images.outputs.ui_tags }}

      - name: Publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.images.outputs.worker_tags }}

      - name: Publish worker-agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/worker-agent.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.images.outputs.worker_agent_tags }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_NAME: ${{ steps.tag.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")" \
            --jq '.body' > "${NOTES_FILE}"

          cat >> "${NOTES_FILE}" <<'EOF'

          ## Operator Notes
          - Use `encodr version` and `encodr doctor` after upgrade or install.
          - Update with `encodr update --apply`.
          - Restart the container or host afterwards if newly passed-through storage or GPU devices are not visible yet.
          - GHCR images are published for the release tag. Stable releases also publish `latest`.
          EOF

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          else
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${NOTES_FILE}" \
              $([[ "${RELEASE_PRERELEASE}" == "true" ]] && echo "--prerelease")
          fi
