name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag could not be resolved" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Encodr ${tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag exists
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.release_name }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Operator Notes
            - Use `encodr version` and `encodr doctor` after upgrade or install.
            - Update with `encodr update --apply`.
            - Restart the container or host afterwards if newly passed-through storage or GPU devices are not visible yet.
