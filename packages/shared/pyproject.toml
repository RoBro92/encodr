[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "encodr-shared"
dynamic = ["version"]
description = "Shared types for encodr"
requires-python = ">=3.11"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["encodr_shared"]

[tool.hatch.version]
path = "../../VERSION"
pattern = "^(?P<version>.+)$"
