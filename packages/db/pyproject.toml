[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "encodr-db"
version = "0.1.2"
description = "Database package for encodr"
requires-python = ">=3.12"
dependencies = [
  "SQLAlchemy>=2.0,<3.0",
  "alembic>=1.13,<2.0",
  "encodr-core",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0,<9.0",
]

[tool.hatch.build.targets.wheel]
packages = ["encodr_db"]
