[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "encodr-core"
version = "0.1.2"
description = "Shared core logic for encodr"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7,<3.0",
  "PyYAML>=6.0,<7.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0,<9.0",
]

[tool.hatch.build.targets.wheel]
packages = ["encodr_core"]
