[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "encodr-core"
dynamic = ["version"]
description = "Shared core logic for encodr"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.7,<3.0",
  "PyYAML>=6.0,<7.0",
  "encodr-shared",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0,<9.0",
]

[tool.hatch.build.targets.wheel]
packages = ["encodr_core"]

[tool.hatch.version]
path = "../../VERSION"
pattern = "^(?P<version>.+)$"
